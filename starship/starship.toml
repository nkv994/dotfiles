#format = """
#[‚ï≠‚îÄuser‚îÄ‚îÄ‚îÄ‚ùØ](bold blue) $username
#[‚î£‚îÄsystem‚îÄ‚ùØ](bold yellow) $hostname
#[‚î£‚îÄproject‚ùØ](bold red) $directory$rust$git_branch$git_state$git_status$conda$package$golang$terraform$docker_context$python$docker_context$nodejs
#[‚ï∞‚îÄcmd‚îÄ‚îÄ‚îÄ‚îÄ‚ùØ](bold green) 
#"""
[username]
style_user = "green bold"
style_root = "red bold"
format = "[$user]($style) "
disabled = false
show_always = true

[hostname]
ssh_only = false
format = 'on [$hostname](bold purple) '
trim_at = "."
disabled = false

# Replace the "‚ùØ" symbol in the prompt with "‚ûú"
[character]                            # The name of the module we are configuring is "character"
success_symbol = "[‚ûú](bold green)"     # The "success_symbol" segment is being set to "‚ûú" with the color "bold green"
error_symbol = "[‚úó](bold red)"

# Ôî∂ Ôî¥
# configure directory
[directory]
read_only = " ÔÝΩ"
truncation_length = 10
truncate_to_repo = true # truncates directory to root folder if in github repo
style = "bold italic blue"

[cmd_duration]
min_time = 4
show_milliseconds = false
disabled = false
style = "bold italic red"

[aws]
symbol = "ÓåΩ  "

[conda]
symbol = "ÔÑå "
format = "via [$symbol$environment]($style) "
style = "bold green"

[dart]
symbol = "Óûò "

#[directory]
#read_only = " ÔÝΩ"

[docker_context]
symbol = "Ôåà "
format = "via [$symbol$context]($style) "
style = "blue bold"
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]
detect_folders = []
disabled = false

[elixir]
symbol = "Óâµ "

[elm]
symbol = "Óò¨ "

[git_branch]
symbol = "Ôêò "

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
stashed = "[${count}*](green)" 
modified = "[${count}+](yellow)" 
deleted =  "[${count}-](red)" 
conflicted =  "[${count}~](red)" 
ahead = "‚á°${count}"
behind = "‚á£${count}"
untracked = "[${count}?](blue)" 
staged = "[${count}+](green)" 

[git_state]
style =	"bold red"
format = "[$state( $progress_current/$progress_total) ]($style)"
rebase = "rebase"
merge = "merge"	
revert = "revert"	
cherry_pick = "cherry"
bisect = "bisect"	
am = "am"	
am_or_rebase = "am/rebase"

